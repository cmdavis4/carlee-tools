[workspace]
name = "skyutils"
version = "1.0.0"
description = "Core utilities, types, and plotting for atmospheric science"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
# Core required dependencies
python = ">=3.8"
typing-extensions = "*"
pip = "*"
numpy = "*"
matplotlib = ">=3.0"
xarray = "*"
metpy = "*"
tqdm = "*"
imageio = "*"

[feature.scientific.dependencies]
# Optional scientific dependencies
pandas = "*"
netcdf4 = "*"

[feature.test.dependencies]
# Testing tools
pytest = ">=7.0"
pytest-cov = "*"

[feature.dev.dependencies]
# Development tools
black = "*"
ruff = "*"
mypy = "*"
ipython = "*"
jupyter = "*"

[environments]
# Minimal environment - core dependencies + testing
minimal = {features = ["test"], solve-group = "minimal"}

# Full environment - includes scientific dependencies + testing
full = {features = ["scientific", "test"], solve-group = "full"}

# Development environment - includes everything
dev = {features = ["scientific", "test", "dev"], solve-group = "dev"}

[tasks]
# Install the package in editable mode
install = "pip install -e ."

# Run all tests
test = {cmd = "pytest tests/ -v", depends-on = ["install"]}

# Run tests with coverage
test-cov = {cmd = "pytest tests/ -v --cov=skyutils --cov-report=term-missing --cov-report=html", depends-on = ["install"]}

# Format code
format = "black skyutils/ tests/"

# Lint code
lint = "ruff check skyutils/ tests/"

# Type check
typecheck = "mypy skyutils/"

# Run all quality checks
check = {depends-on = ["format", "lint", "typecheck"]}

# Clean up build artifacts and caches
clean = "rm -rf build/ dist/ *.egg-info .pytest_cache/ .coverage .mypy_cache/ __pycache__/ skyutils/__pycache__/ tests/__pycache__/ htmlcov/"

[pypi-dependencies]
build = ">=1.4.0, <2"
twine = ">=6.2.0, <7"
